<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaguaraeGiros | Admin Elite Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand: #0f172a; 
            --slate: #64748b;
            --bg: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: var(--brand); }

        .admin-container {
            max-width: 480px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .tabs {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 9px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--slate);
        }

        .tab.active { background: white; color: var(--brand); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .tasa-display {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border: 1px solid #e2e8f0;
        }

        .tasa-item { text-align: center; }
        .tasa-val { display: block; font-weight: 800; font-size: 1.1rem; color: var(--brand); }
        .tasa-label { font-size: 0.65rem; color: var(--slate); font-weight: 700; text-transform: uppercase; }

        label { display: block; font-size: 0.65rem; font-weight: 800; margin-top: 12px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 4px;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-brand { background: var(--brand); color: white; }
        .btn-brand:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: var(--slate); font-size: 0.75rem; }

        #ticket-canvas { display: none; }
        .result-image {
            width: 100%;
            margin-top: 20px;
            display: none;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="tabs">
        <div class="tab active" onclick="showTab('cotizador')">Cotización</div>
        <div class="tab" onclick="showTab('ticket')">Generar Ticket</div>
    </div>

    <div id="cotizador" class="section active">
        <div class="tasa-display">
            <div class="tasa-item">
                <span class="tasa-label">Tasa COP</span>
                <span class="tasa-val" id="val-tasa-cop">0.0</span>
            </div>
            <div class="tasa-item">
                <span class="tasa-label">Tasa BCV</span>
                <span class="tasa-val" id="val-tasa-bcv">0.0</span>
            </div>
        </div>

        <label>Envías (COP)</label>
        <input type="number" id="cot-pesos" placeholder="0.00">
        <label>Recibes (VES)</label>
        <input type="number" id="cot-bs" placeholder="0.00">
        <label>Equivalente (USD)</label>
        <input type="number" id="cot-usd" placeholder="0.00">
        
        <button class="btn btn-brand" onclick="compartirCotizacion()">
            <i class="fab fa-whatsapp"></i> Compartir Cotización
        </button>
    </div>

    <div id="ticket" class="section">
        <textarea id="ws-paste" rows="4" placeholder="Pega el mensaje de Nueva Solicitud..."></textarea>
        <button class="btn btn-outline" onclick="procesarPegado()"><i class="fas fa-magic"></i> Auto-completar</button>

        <label>Beneficiario</label><input type="text" id="tick-nombre">
        <label>Cédula</label><input type="text" id="tick-cedula">
        <label>Cuenta / Banco</label><input type="text" id="tick-cuenta">
        <label>Pago Móvil</label><input type="text" id="tick-pm">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Monto Enviado (COP)</label><input type="text" id="tick-cop"></div>
            <div><label>Monto Recibido (Bs)</label><input type="text" id="tick-bs"></div>
        </div>

        <button class="btn btn-brand" onclick="generarTicket()"><i class="fas fa-print"></i> Generar Ticket Premium</button>

        <canvas id="ticket-canvas" width="500" height="920"></canvas>
        <img id="ticket-result" class="result-image">
        <button id="btn-share" class="btn btn-brand" style="display:none;" onclick="compartirImagen()"><i class="fab fa-whatsapp"></i> Compartir Ticket</button>
    </div>
</div>

<script>
    let tasaDia = 0, tasaDolar = 0;

    function formatMoney(val) {
        if (!val || val === "") return "0,00";
        let n = typeof val === 'string' ? parseFloat(val.replace(/[^\d.]/g, '')) : val;
        return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function cargarTasas() {
        fetch('https://raw.githubusercontent.com/Ka3lthas/tasa-cambio/main/tasa.json')
            .then(res => res.json()).then(data => {
                tasaDia = data.tasaDia; 
                tasaDolar = data.tasaDolar;
                document.getElementById('val-tasa-cop').innerText = tasaDia;
                document.getElementById('val-tasa-bcv').innerText = tasaDolar;
            });
    }

    const cotInputs = ['cot-pesos', 'cot-bs', 'cot-usd'];
    cotInputs.forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            const rawVal = e.target.value;
            
            // Corrección 1: Si el campo está vacío, vaciar los demás
            if (rawVal === "") {
                cotInputs.forEach(inputId => document.getElementById(inputId).value = "");
                return;
            }

            const val = parseFloat(rawVal) || 0;
            if (id === 'cot-pesos') {
                const bs = val / tasaDia;
                document.getElementById('cot-bs').value = bs.toFixed(2);
                document.getElementById('cot-usd').value = (bs / tasaDolar).toFixed(2);
            } else if (id === 'cot-bs') {
                document.getElementById('cot-pesos').value = (val * tasaDia).toFixed(0);
                document.getElementById('cot-usd').value = (val / tasaDolar).toFixed(2);
            } else if (id === 'cot-usd') {
                const bs = val * tasaDolar;
                document.getElementById('cot-bs').value = bs.toFixed(2);
                document.getElementById('cot-pesos').value = (bs * tasaDia).toFixed(0);
            }
        });
    });

    function compartirCotizacion() {
        const msj = `*COTIZACIÓN NAGUARAEGIROS*%0A%0A` +
                    `Envías: *${formatMoney(document.getElementById('cot-pesos').value)} COP*%0A` +
                    `Recibes: *${formatMoney(document.getElementById('cot-bs').value)} Bs*%0A` +
                    `Equivalente: *${formatMoney(document.getElementById('cot-usd').value)} USD*%0A%0A` +
                    `Tasa COP: *${tasaDia} Bs/COP*%0A` +
                    `Dolar Tasa BCV: *${tasaDolar} Bs/USD*%0A%0A` +
                    `_Esta cotización es válida por los próximos 60 minutos._`;
        window.open(`https://wa.me/?text=${msj}`, '_blank');
    }

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Corrección 2: Lógica de Autocompletado mejorada
    function procesarPegado() {
        const raw = document.getElementById('ws-paste').value;
        
        // Buscar montos usando Regex (detecta números seguidos de COP o Bs)
        const enviaMatch = raw.match(/Envía:\s*([\d,.]+)/i);
        const recibeMatch = raw.match(/Recibe:\s*([\d,.]+)/i);
        
        if (enviaMatch) document.getElementById('tick-cop').value = enviaMatch[1].trim();
        if (recibeMatch) document.getElementById('tick-bs').value = recibeMatch[1].trim();

        // Dividir por líneas para encontrar los datos del beneficiario
        const lines = raw.split('\n').map(l => l.trim()).filter(l => l !== "");
        let separatorIndexes = [];
        lines.forEach((l, i) => { if(l.includes('---')) separatorIndexes.push(i); });

        // Basado en tu estructura: el beneficiario empieza después del segundo separador "---"
        if (separatorIndexes.length >= 2) {
            const dataStart = separatorIndexes[1] + 1;
            document.getElementById('tick-nombre').value = lines[dataStart] || "";
            document.getElementById('tick-cedula').value = lines[dataStart+1] || "";
            document.getElementById('tick-cuenta').value = lines[dataStart+2] || "";
            
            // Buscar el Pago Móvil específicamente por texto
            const pmLine = lines.find(l => l.toLowerCase().includes('pago móvil'));
            if (pmLine) {
                document.getElementById('tick-pm').value = pmLine.split(':')[1]?.trim() || pmLine;
            }
        }
    }

    function generarTicket() {
        const canvas = document.getElementById('ticket-canvas');
        const ctx = canvas.getContext('2d');
        const ref = (parseInt(localStorage.getItem('ref_v5') || 0) + 1).toString().padStart(5, '0');
        
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#f8fafc";
        drawZigZag(ctx, 0, 15, "up");
        drawZigZag(ctx, 920 - 15, 15, "down");

        ctx.textAlign = "center";
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 38px 'Playfair Display'";
        ctx.fillText("NAGUARAEGIROS", canvas.width/2, 90);
        
        ctx.font = "600 14px 'Inter'";
        ctx.fillStyle = "#94a3b8";
        ctx.letterSpacing = "2px";
        ctx.fillText("COMPROBANTE DE OPERACIÓN", canvas.width/2, 125);
        ctx.letterSpacing = "0px";

        ctx.textAlign = "left";
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 16px 'Inter'";
        ctx.fillText("REFERENCIA:", 50, 200);
        ctx.textAlign = "right";
        ctx.fillText(`NG-${ref}`, 450, 200);
        
        ctx.textAlign = "left";
        ctx.fillStyle = "#94a3b8";
        ctx.font = "400 13px 'Inter'";
        ctx.fillText(`Emitido el: ${new Date().toLocaleString()}`, 50, 225);

        drawDividerLine(ctx, 50, 260, 400);

        let y = 310;
        const addField = (label, value) => {
            ctx.fillStyle = "#94a3b8";
            ctx.font = "bold 11px 'Inter'";
            ctx.fillText(label, 50, y);
            ctx.fillStyle = "#0f172a";
            ctx.font = "600 18px 'Inter'";
            ctx.fillText(value.toUpperCase() || "---", 50, y + 25);
            y += 75;
        };

        addField("BENEFICIARIO", document.getElementById('tick-nombre').value);
        addField("CÉDULA / ID", document.getElementById('tick-cedula').value);
        addField("CUENTA BANCARIA", document.getElementById('tick-cuenta').value);
        addField("PAGO MÓVIL", document.getElementById('tick-pm').value);

        ctx.fillStyle = "#f1f5f9";
        ctx.roundRect(40, y - 10, 420, 140, 12).fill();
        
        ctx.textAlign = "center";
        ctx.fillStyle = "#475569";
        ctx.font = "bold 14px 'Inter'";
        ctx.fillText(`Monto enviado: ${formatMoney(document.getElementById('tick-cop').value)} COP`, canvas.width/2, y + 25);
        
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 44px 'Inter'";
        ctx.fillText(`${formatMoney(document.getElementById('tick-bs').value)} Bs.`, canvas.width/2, y + 80);

        ctx.fillStyle = "#64748b";
        ctx.font = "600 12px 'Inter'";
        ctx.fillText("Monto Recibido en Venezuela", canvas.width/2, y + 110);

        ctx.fillStyle = "#10b981";
        ctx.font = "bold 18px 'Inter'";
        ctx.fillText("✓ TRANSFERENCIA EXITOSA", canvas.width/2, y + 190);

        ctx.fillStyle = "#94a3b8";
        ctx.font = "italic 15px 'Inter'";
        ctx.fillText("Gracias por confiar en Naguaraegiros.", canvas.width/2, y + 230);

        const img = document.getElementById('ticket-result');
        img.src = canvas.toDataURL("image/png");
        img.style.display = "block";
        document.getElementById('btn-share').style.display = "flex";
        localStorage.setItem('ref_v5', ref);
    }

    function drawZigZag(ctx, y, size, dir) {
        ctx.beginPath();
        if(dir === "up") {
            ctx.moveTo(0,0);
            for(let x=0; x<=500; x+=10) { ctx.lineTo(x+5, size); ctx.lineTo(x+10, 0); }
        } else {
            ctx.moveTo(0,920);
            for(let x=0; x<=500; x+=10) { ctx.lineTo(x+5, 920-size); ctx.lineTo(x+10, 920); }
        }
        ctx.fill();
    }

    function drawDividerLine(ctx, x, y, w) {
        ctx.strokeStyle = "#f1f5f9";
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+w, y); ctx.stroke();
    }

    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        this.beginPath(); this.moveTo(x+r, y); this.arcTo(x+w, y, x+w, y+h, r);
        this.arcTo(x+w, y+h, x, y+h, r); this.arcTo(x, y+h, x, y, r);
        this.arcTo(x, y, x+w, y, r); this.closePath(); return this;
    }

    async function compartirImagen() {
        const blob = await (await fetch(document.getElementById('ticket-result').src)).blob();
        const file = new File([blob], 'ticket.png', {type: 'image/png'});
        navigator.share({files: [file], title: 'Comprobante NaguaraeGiros'});
    }

    window.onload = cargarTasas;
</script>
</body>
</html>
