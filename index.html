<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaguaraeGiros | Admin Elite Final</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --brand: #0f172a;
            --slate: #64748b;
            --bg: #f8fafc;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: var(--brand); }

        .admin-container {
            max-width: 550px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .tabs {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 9px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--slate);
            transition: 0.3s;
        }

        .tab.active { background: white; color: var(--brand); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .tasa-display {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border: 1px solid #e2e8f0;
        }

        .tasa-item { text-align: center; }
        .tasa-val { display: block; font-weight: 800; font-size: 1.1rem; color: var(--brand); }
        .tasa-label { font-size: 0.65rem; color: var(--slate); font-weight: 700; text-transform: uppercase; }

        label { display: block; font-size: 0.65rem; font-weight: 800; margin-top: 12px; color: var(--slate); text-transform: uppercase; letter-spacing: 0.5px; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 4px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        #ws-paste {
            min-height: 80px;
            max-height: 400px;
            background: #fdfdfd;
            border: 2px dashed #cbd5e1;
            resize: none;
            overflow-y: hidden;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-brand { background: var(--brand); color: white; }
        .btn-brand:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: var(--slate); font-size: 0.75rem; }

        #ticket-canvas { display: none; }
        .result-image {
            width: 100%;
            margin-top: 20px;
            display: none;
            border-radius: 15px;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.1));
        }

        .dashboard-header { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .dashboard-header > * { flex: 1; min-width: 120px; }
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .kpi-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; text-align: center; }
        .kpi-title { font-size: 0.65rem; color: var(--slate); font-weight: 700; text-transform: uppercase; }
        .kpi-value { font-size: 1.1rem; font-weight: 800; color: var(--brand); margin-top: 5px; }
        .chart-container { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .canvas-wrapper { position: relative; width: 100%; text-align: center; }
        .meta-top { font-size: 0.65rem; color: var(--slate); font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
        .meta-text { font-size: 0.7rem; color: var(--slate); margin-top: 8px; font-weight: 600; line-height: 1.5; }
        .meta-text span { color: var(--brand); font-weight: 800; display: block; font-size: 0.8rem; }

        .table-wrapper { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 10px; background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: left; }
        th { background: #f1f5f9; padding: 10px; color: var(--slate); font-weight: 700; }
        td { padding: 10px; border-top: 1px solid #e2e8f0; vertical-align: middle; }

        .btn-view {
            background: #eff6ff;
            color: var(--accent);
            border: 1px solid #dbeafe;
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-view:hover { background: var(--accent); color: white; }

        .mini-note {
            margin-top: 10px;
            font-size: 0.7rem;
            color: var(--slate);
            line-height: 1.4;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 9999;
        }
        .modal-overlay.show { display: flex; }
        .modal-card {
            width: 100%;
            max-width: 540px;
            background: #fff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,.22);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 16px 18px 10px;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        .modal-kicker {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--slate);
            font-weight: 800;
        }
        .modal-header h3 {
            margin-top: 4px;
            font-size: 1rem;
            color: var(--brand);
        }
        .modal-close {
            border: none;
            background: #f1f5f9;
            color: var(--brand);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .modal-body {
            padding: 16px 18px 18px;
            overflow-y: auto;
        }
        .modal-toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .modal-toolbar .btn {
            margin-top: 0;
            flex: 1 1 150px;
        }
        .modal-preview {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            background: #f8fafc;
            overflow: hidden;
        }
        .modal-preview img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 60vh;
            object-fit: contain;
            background: #fff;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="tabs">
        <div id="tab-cotizador" class="tab active" onclick="showTab('cotizador')">Cotización</div>
        <div id="tab-ticket" class="tab" onclick="showTab('ticket')">Ticket</div>
        <div id="tab-contabilidad" class="tab" onclick="showTab('contabilidad')">Contabilidad</div>
    </div>

    <div id="cotizador" class="section active">
        <div class="tasa-display">
            <div class="tasa-item">
                <span class="tasa-label">Tasa COP</span>
                <span class="tasa-val" id="val-tasa-cop">0.0</span>
            </div>
            <div class="tasa-item">
                <span class="tasa-label">Tasa BCV</span>
                <span class="tasa-val" id="val-tasa-bcv">0.0</span>
            </div>
        </div>

        <label>Envías (COP)</label>
        <input type="number" id="cot-pesos" placeholder="0.00">
        <label>Recibes (VES)</label>
        <input type="number" id="cot-bs" placeholder="0.00">
        <label>Equivalente (USD)</label>
        <input type="number" id="cot-usd" placeholder="0.00">

        <button class="btn btn-brand" onclick="compartirCotizacion()">
            <i class="fab fa-whatsapp"></i> Compartir Cotización
        </button>
    </div>

    <div id="ticket" class="section">
        <label>Pega aquí el mensaje de WhatsApp</label>
        <textarea id="ws-paste" placeholder="Pega el mensaje de Nueva Solicitud..." oninput="autoExpand(this)"></textarea>
        <button class="btn btn-outline" onclick="procesarPegado()"><i class="fas fa-magic"></i> Auto-completar Datos</button>

        <label>Beneficiario</label><input type="text" id="tick-nombre">
        <label>Cédula</label><input type="text" id="tick-cedula">
        <label>Cuenta / Banco</label><input type="text" id="tick-cuenta">
        <label>Pago Móvil</label><input type="text" id="tick-pm">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Monto Enviado (COP)</label><input type="text" id="tick-cop"></div>
            <div><label>Monto Recibido (Bs)</label><input type="text" id="tick-bs"></div>
        </div>

        <button class="btn btn-brand" onclick="generarTicket()"><i class="fas fa-print"></i> Generar Ticket Premium</button>

        <canvas id="ticket-canvas" width="500" height="920"></canvas>
        <img id="ticket-result" class="result-image">
        <button id="btn-share" class="btn btn-brand" style="display:none;" onclick="compartirImagen()"><i class="fab fa-whatsapp"></i> Compartir Ticket</button>
    </div>

    <div id="contabilidad" class="section">
        <div class="dashboard-header">
            <input type="date" id="filtro-dia" onchange="actualizarDashboard()" title="Día específico">
            <select id="filtro-mes" onchange="actualizarDashboard()">
                <option value="all">Todo el mes (Histórico)</option>
            </select>
            <input type="text" id="filtro-texto" placeholder="Buscar cliente..." oninput="actualizarDashboard()">
        </div>

        <div class="chart-container">
            <div class="canvas-wrapper">
                <div id="texto-periodo-diaria" class="meta-top"></div>
                <canvas id="chart-diaria"></canvas>
                <div id="texto-meta-diaria" class="meta-text"></div>
            </div>
            <div class="canvas-wrapper">
                <div id="texto-periodo-mensual" class="meta-top"></div>
                <canvas id="chart-mensual"></canvas>
                <div id="texto-meta-mensual" class="meta-text"></div>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-title" id="lbl-monto">Monto (Seleccionado)</div>
                <div class="kpi-value" id="kpi-monto">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Ganancia (10%)</div>
                <div class="kpi-value" id="kpi-ganancia" style="color: #10b981;">0</div>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="btn btn-brand" style="background:#15803d; margin-top:0;" onclick="descargarExcel()"><i class="fas fa-file-excel"></i> Excel</button>
            <button class="btn btn-brand" style="background:#dc2626; margin-top:0;" onclick="descargarPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>

        <div class="table-wrapper">
            <table id="tabla-registros">
                <thead>
                    <tr>
                        <th>Fecha y hora</th>
                        <th>Ref</th>
                        <th>Cliente</th>
                        <th>Monto</th>
                        <th>Ganancia</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="mini-note">
            Pulsa el ícono para abrir una vista previa del comprobante de cualquier operación anterior.
        </div>

        <div id="modal-comprobante" class="modal-overlay" onclick="cerrarVistaComprobante(event)">
            <div class="modal-card" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <div>
                        <div class="modal-kicker">Vista previa</div>
                        <h3 id="modal-ref-title">Comprobante</h3>
                    </div>
                    <button class="modal-close" onclick="cerrarVistaComprobante()" aria-label="Cerrar"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body">
                    <div class="modal-toolbar">
                        <button class="btn btn-outline" onclick="cerrarVistaComprobante()"><i class="fas fa-arrow-left"></i> Volver atrás</button>
                        <button class="btn btn-brand" onclick="compartirTicketDesdeModal()"><i class="fab fa-whatsapp"></i> Compartir ticket</button>
                        <button class="btn btn-outline" onclick="irTicketDesdeModal()"><i class="fas fa-arrow-right"></i> Abrir en Ticket</button>
                    </div>
                    <div class="modal-preview">
                        <img id="modal-ticket-img" alt="Vista previa del comprobante">
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    let tasaDia = 0, tasaDolar = 0;

    const META_DIARIA = 500000;
    const META_MENSUAL = 15000000;
    let db = JSON.parse(localStorage.getItem('naguara_erp') || '[]');
    let chartDiaria, chartMensual;

    let currentTicketDraft = null;

    function autoExpand(textarea) {
        textarea.style.height = 'inherit';
        const height = textarea.scrollHeight;
        textarea.style.height = height + 'px';
        if (height > 400) textarea.style.overflowY = 'auto';
        else textarea.style.overflowY = 'hidden';
    }

    function parseFlexibleNumber(val) {
        if (val === null || val === undefined || val === '') return 0;
        if (typeof val === 'number') return Number.isFinite(val) ? val : 0;

        let s = String(val).trim();
        if (!s) return 0;

        s = s.replace(/[\s\u00A0]/g, '');
        s = s.replace(/[^\d,.-]/g, '');
        if (!s) return 0;

        const lastComma = s.lastIndexOf(',');
        const lastDot = s.lastIndexOf('.');

        if (lastComma > -1 && lastDot > -1) {
            const decimalSep = lastComma > lastDot ? ',' : '.';
            const thousandSep = decimalSep === ',' ? '.' : ',';
            s = s.split(thousandSep).join('');
            s = s.replace(decimalSep, '.');
        } else if (lastComma > -1) {
            const parts = s.split(',');
            if (parts.length === 2 && parts[1].length <= 2) {
                s = parts[0].replace(/\./g, '') + '.' + parts[1];
            } else {
                s = s.replace(/[.,]/g, '');
            }
        } else if (lastDot > -1) {
            const parts = s.split('.');
            if (parts.length === 2 && parts[1].length <= 2) {
                s = parts[0].replace(/,/g, '') + '.' + parts[1];
            } else {
                s = s.replace(/[.,]/g, '');
            }
        }

        const n = parseFloat(s);
        return Number.isFinite(n) ? n : 0;
    }

    function formatMoney(val) {
        const n = parseFlexibleNumber(val);
        return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatDateTime(iso) {
        if (!iso) return '--';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '--';
        return d.toLocaleString('es-ES', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    function formatMonthLabel(value) {
        if (!value || value === 'all') return 'HISTÓRICO';
        const [year, month] = value.split('-');
        const date = new Date(Number(year), Number(month) - 1, 1);
        return date.toLocaleString('es-ES', { month: 'long', year: 'numeric' }).toUpperCase();
    }

    function getLocalDateKey(dateObj = new Date()) {
        const offset = dateObj.getTimezoneOffset() * 60000;
        return new Date(dateObj - offset).toISOString().split('T')[0];
    }

    function getLocalMonthKey(dateObj = new Date()) {
        const offset = dateObj.getTimezoneOffset() * 60000;
        return new Date(dateObj - offset).toISOString().slice(0, 7);
    }

    function makeReferenceFromStorage() {
        const nextRefNum = parseInt(localStorage.getItem('ref_v5') || '0', 10) + 1;
        return `NG-${String(nextRefNum).padStart(5, '0')}`;
    }

    function ensureMonthOption(monthKey) {
        if (!monthKey || monthKey === 'all') return;
        const selectorMes = document.getElementById('filtro-mes');
        const exists = [...selectorMes.options].some(opt => opt.value === monthKey);
        if (exists) return;

        const option = document.createElement('option');
        option.value = monthKey;
        const [year, month] = monthKey.split('-');
        const date = new Date(Number(year), Number(month) - 1, 1);
        option.text = date.toLocaleString('es-ES', { month: 'long', year: 'numeric' }).toUpperCase();
        selectorMes.appendChild(option);
    }

    function syncReferenceCounter(ref) {
        const num = parseInt(String(ref || '').replace(/^NG-/, ''), 10);
        if (Number.isFinite(num)) {
            const current = parseInt(localStorage.getItem('ref_v5') || '0', 10);
            if (num > current) localStorage.setItem('ref_v5', String(num));
        }
    }

    function cargarTasas() {
        fetch('https://raw.githubusercontent.com/Ka3lthas/tasa-cambio/main/tasa.json')
            .then(res => res.json())
            .then(data => {
                tasaDia = Number(data.tasaDia) || 0;
                tasaDolar = Number(data.tasaDolar) || 0;
                document.getElementById('val-tasa-cop').innerText = tasaDia;
                document.getElementById('val-tasa-bcv').innerText = tasaDolar;
            })
            .catch(() => {
                console.error('Error cargando tasas');
                document.getElementById('val-tasa-cop').innerText = '---';
                document.getElementById('val-tasa-bcv').innerText = '---';
            });

        inicializarContabilidad();
    }

    const cotInputs = ['cot-pesos', 'cot-bs', 'cot-usd'];
    cotInputs.forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            const raw = e.target.value;
            const val = parseFlexibleNumber(raw);

            if (raw === '') {
                cotInputs.forEach(inputId => document.getElementById(inputId).value = '');
                return;
            }

            if (!tasaDia || !tasaDolar) return;

            if (id === 'cot-pesos') {
                const bs = val / tasaDia;
                document.getElementById('cot-bs').value = bs.toFixed(2);
                document.getElementById('cot-usd').value = (bs / tasaDolar).toFixed(2);
            } else if (id === 'cot-bs') {
                document.getElementById('cot-pesos').value = (val * tasaDia).toFixed(2);
                document.getElementById('cot-usd').value = (val / tasaDolar).toFixed(2);
            } else if (id === 'cot-usd') {
                const bs = val * tasaDolar;
                document.getElementById('cot-bs').value = bs.toFixed(2);
                document.getElementById('cot-pesos').value = (bs * tasaDia).toFixed(2);
            }
        });
    });

    function compartirCotizacion() {
        const p = document.getElementById('cot-pesos').value;
        const b = document.getElementById('cot-bs').value;
        const u = document.getElementById('cot-usd').value;

        const msj = encodeURIComponent(
            `*COTIZACIÓN NAGUARAEGIROS*\n\n` +
            `Envías: *${formatMoney(p)} COP*\n` +
            `Recibes: *${formatMoney(b)} Bs*\n` +
            `Equivalente: *${formatMoney(u)} USD*\n\n` +
            `Tasa COP: *${tasaDia} Bs/COP*\n` +
            `Dolar Tasa BCV: *${tasaDolar} Bs/USD*\n\n` +
            `_Esta cotización es válida por los próximos 60 minutos._`
        );

        window.open(`https://wa.me/?text=${msj}`, '_blank');
    }

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');

        const tabMap = { 'cotizador': 'tab-cotizador', 'ticket': 'tab-ticket', 'contabilidad': 'tab-contabilidad' };
        document.getElementById(tabMap[id]).classList.add('active');

        if (id === 'contabilidad') {
            actualizarDashboard();
        }
    }

    function procesarPegado() {
        const area = document.getElementById('ws-paste');
        let raw = area.value;
        if (!raw) return;

        raw = raw.replace(/\r/g, '');
        raw = raw.replace(/[\*_]/g, '');

        const normalizarLinea = (label) => {
            const regex = new RegExp(`${label}\s*:?\s*([^\n]+)`, 'i');
            const match = raw.match(regex);
            return match ? match[1].trim() : '';
        };

        const envia = normalizarLinea('Env[ií]a');
        const recibe = normalizarLinea('Recibe');
        const tasa = normalizarLinea('Tasa usada');
        const beneficiario = normalizarLinea('Beneficiario');
        const cedula = normalizarLinea('C[eé]dula');
        const cuenta = normalizarLinea('Cuenta');
        const telefono = normalizarLinea('Tel[eé]fono');

        if (envia) document.getElementById('tick-cop').value = envia.replace(/[^\d.,-]/g, '').trim();
        if (recibe) document.getElementById('tick-bs').value = recibe.replace(/[^\d.,-]/g, '').trim();

        if (beneficiario) document.getElementById('tick-nombre').value = beneficiario;
        if (cedula) document.getElementById('tick-cedula').value = cedula.replace(/[^\d]/g, '');
        if (cuenta) document.getElementById('tick-cuenta').value = cuenta.replace(/^[:\s]+/, '').trim();
        if (telefono) document.getElementById('tick-pm').value = telefono.replace(/[^\d]/g, '');

        if (tasa && !document.getElementById('cot-bs').value) {
            const tasaNum = parseFlexibleNumber(tasa);
            if (tasaNum > 0) {
                document.getElementById('cot-pesos').value = document.getElementById('tick-cop').value || '';
            }
        }

        area.style.height = '80px';
    }

    function buildTicketFromForm(refOverride = null, source = 'draft') {
        const copText = document.getElementById('tick-cop').value;
        const bsText = document.getElementById('tick-bs').value;

        const ref = refOverride || (currentTicketDraft && currentTicketDraft.source === 'draft' && !currentTicketDraft.committed)
            ? (refOverride || currentTicketDraft.ref)
            : makeReferenceFromStorage();

        return {
            ref,
            fechaCompleta: new Date().toISOString(),
            cliente: document.getElementById('tick-nombre').value.trim(),
            cedula: document.getElementById('tick-cedula').value.trim(),
            cuenta: document.getElementById('tick-cuenta').value.trim(),
            pm: document.getElementById('tick-pm').value.trim(),
            cop: parseFlexibleNumber(copText),
            bs: parseFlexibleNumber(bsText),
            source,
            committed: false
        };
    }

    function renderTicket(ticketData) {
        const canvas = document.getElementById('ticket-canvas');
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#f8fafc';
        drawZigZag(ctx, 0, 15, 'up');
        drawZigZag(ctx, 920 - 15, 15, 'down');

        ctx.textAlign = 'center';
        ctx.fillStyle = '#0f172a';
        ctx.font = "bold 38px 'Playfair Display'";
        ctx.fillText('NAGUARAEGIROS', canvas.width / 2, 90);

        ctx.font = "600 14px 'Inter'";
        ctx.fillStyle = '#94a3b8';
        ctx.letterSpacing = '2px';
        ctx.fillText('COMPROBANTE DE OPERACIÓN', canvas.width / 2, 125);
        ctx.letterSpacing = '0px';

        ctx.textAlign = 'left';
        ctx.fillStyle = '#0f172a';
        ctx.font = "bold 16px 'Inter'";
        ctx.fillText('REFERENCIA:', 50, 200);
        ctx.textAlign = 'right';
        ctx.fillText(ticketData.ref, 450, 200);

        ctx.textAlign = 'left';
        ctx.fillStyle = '#94a3b8';
        ctx.font = "400 13px 'Inter'";
        ctx.fillText(`Emitido: ${new Date(ticketData.fechaCompleta).toLocaleString()}`, 50, 225);

        drawDividerLine(ctx, 50, 260, 400);

        let y = 310;
        const addField = (label, value) => {
            ctx.fillStyle = '#94a3b8';
            ctx.font = "bold 11px 'Inter'";
            ctx.fillText(label, 50, y);
            ctx.fillStyle = '#0f172a';
            ctx.font = "600 18px 'Inter'";
            ctx.fillText((value || '---').toUpperCase(), 50, y + 25);
            y += 75;
        };

        addField('BENEFICIARIO', ticketData.cliente);
        addField('CÉDULA / ID', ticketData.cedula);
        addField('CUENTA BANCARIA', ticketData.cuenta);
        addField('PAGO MÓVIL', ticketData.pm);

        ctx.fillStyle = '#f1f5f9';
        ctx.roundRect(40, y - 10, 420, 140, 12).fill();

        ctx.textAlign = 'center';
        ctx.fillStyle = '#475569';
        ctx.font = "bold 14px 'Inter'";
        ctx.fillText(`Monto enviado: ${formatMoney(ticketData.cop)} COP`, canvas.width / 2, y + 25);

        ctx.fillStyle = '#0f172a';
        ctx.font = "bold 44px 'Inter'";
        ctx.fillText(`${formatMoney(ticketData.bs)} Bs.`, canvas.width / 2, y + 80);

        ctx.fillStyle = '#64748b';
        ctx.font = "600 12px 'Inter'";
        ctx.fillText('Monto Recibido en Venezuela', canvas.width / 2, y + 110);

        ctx.fillStyle = '#10b981';
        ctx.font = "bold 18px 'Inter'";
        ctx.fillText('✓ TRANSFERENCIA EXITOSA', canvas.width / 2, y + 190);

        ctx.fillStyle = '#94a3b8';
        ctx.font = "italic 15px 'Inter'";
        ctx.fillText('Gracias por confiar en Naguaraegiros.', canvas.width / 2, y + 230);

        const img = document.getElementById('ticket-result');
        img.src = canvas.toDataURL('image/png');
        img.style.display = 'block';
        document.getElementById('btn-share').style.display = 'flex';
    }

    function generarTicket() {
        const refActualInput = document.getElementById('tick-nombre').getAttribute('data-ref-active');

        let ticketData;

        if (refActualInput) {
            ticketData = buildTicketFromForm(refActualInput, 'history');
            document.getElementById('tick-nombre').removeAttribute('data-ref-active');
        } else if (currentTicketDraft && currentTicketDraft.source === 'draft' && !currentTicketDraft.committed) {
            ticketData = {
                ...buildTicketFromForm(currentTicketDraft.ref, 'draft'),
                ref: currentTicketDraft.ref,
                source: 'draft'
            };
        } else {
            ticketData = buildTicketFromForm(null, 'draft');
        }

        currentTicketDraft = ticketData;
        renderTicket(ticketData);
    }

    function inicializarContabilidad() {
        const selectorMes = document.getElementById('filtro-mes');
        const selectorDia = document.getElementById('filtro-dia');

        const mesesUnicos = [...new Set(db.map(t => (t.fechaCompleta || '').substring(0, 7)).filter(Boolean))];
        mesesUnicos.sort().reverse().forEach(mes => {
            if ([...selectorMes.options].some(opt => opt.value === mes)) return;
            const option = document.createElement('option');
            option.value = mes;
            const [year, month] = mes.split('-');
            const date = new Date(Number(year), Number(month) - 1, 1);
            option.text = date.toLocaleString('es-ES', { month: 'long', year: 'numeric' }).toUpperCase();
            selectorMes.appendChild(option);
        });

        const mesActual = getLocalMonthKey();
        if (mesesUnicos.includes(mesActual)) selectorMes.value = mesActual;

        selectorDia.value = getLocalDateKey();

        const configBase = {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 1], backgroundColor: ['#64748b', '#f1f5f9'], borderWidth: 0 }] },
            options: {
                responsive: true,
                cutout: '75%',
                rotation: 270,
                circumference: 180,
                plugins: { tooltip: { enabled: false }, title: { display: true, font: { size: 14 } } }
            }
        };

        chartDiaria = new Chart(document.getElementById('chart-diaria').getContext('2d'), JSON.parse(JSON.stringify(configBase)));
        chartMensual = new Chart(document.getElementById('chart-mensual').getContext('2d'), JSON.parse(JSON.stringify(configBase)));
    }

    function obtenerColorSalud(pct) {
        if (pct < 40) return '#ef4444';
        if (pct < 80) return '#eab308';
        return '#10b981';
    }

    function obtenerEstadoMeta(current, total) {
        const pct = total > 0 ? (current / total) * 100 : 0;
        if (pct >= 100) return { etiqueta: 'Meta cumplida', color: '#10b981', pct: 100 };
        if (pct >= 80) return { etiqueta: 'Muy cerca', color: '#eab308', pct };
        return { etiqueta: 'En progreso', color: '#ef4444', pct };
    }

    function calcularResumenMeta(current, total) {
        const faltante = Math.max(0, total - current);
        const pct = total > 0 ? (current / total) * 100 : 0;
        return {
            llevas: current,
            falta: faltante,
            porcentaje: pct,
            porcentajeTexto: `${pct.toFixed(1)}%`
        };
    }

    function actualizarDashboard() {
        const mesSeleccionado = document.getElementById('filtro-mes').value;
        const diaSeleccionado = document.getElementById('filtro-dia').value;
        const textoBuscar = document.getElementById('filtro-texto').value.toLowerCase();

        let copMes = 0, copDia = 0, htmlTabla = '';

        const datosFiltrados = db.filter(t => {
            const mesT = (t.fechaCompleta || '').substring(0, 7);
            const fechaObj = new Date(t.fechaCompleta);
            const offset = fechaObj.getTimezoneOffset() * 60000;
            const diaT = (new Date(fechaObj - offset)).toISOString().split('T')[0];

            if (mesT === mesSeleccionado || mesSeleccionado === 'all') copMes += parseFlexibleNumber(t.cop);
            if (diaT === diaSeleccionado && diaSeleccionado !== '') copDia += parseFlexibleNumber(t.cop);

            const cliente = String(t.cliente || '').toLowerCase();
            const ref = String(t.ref || '').toLowerCase();
            const coincideMes = (mesSeleccionado === 'all' || mesT === mesSeleccionado);
            const coincideTexto = cliente.includes(textoBuscar) || ref.includes(textoBuscar);
            return coincideMes && coincideTexto;
        });

        datosFiltrados.reverse().forEach(t => {
            htmlTabla += `<tr>
                <td>${formatDateTime(t.fechaCompleta)}</td>
                <td><strong>${t.ref}</strong></td>
                <td>${t.cliente || ''}</td>
                <td>${formatMoney(t.cop)}</td>
                <td>${formatMoney(t.ganancia)}</td>
                <td><button class="btn-view" onclick="abrirVistaComprobante('${t.ref}')" title="Visualizar comprobante"><i class="fas fa-eye"></i></button></td>
            </tr>`;
        });
        document.querySelector('#tabla-registros tbody').innerHTML = htmlTabla;

        const montoKpi = (diaSeleccionado && textoBuscar === '') ? copDia : copMes;
        document.getElementById('lbl-monto').innerText = diaSeleccionado ? 'Monto Día' : 'Monto Mes';
        document.getElementById('kpi-monto').innerText = formatMoney(montoKpi);
        document.getElementById('kpi-ganancia').innerText = formatMoney(montoKpi * 0.10);

        const resDia = calcularResumenMeta(copDia, META_DIARIA);
        chartDiaria.data.datasets[0].data = [copDia, Math.max(0, META_DIARIA - copDia)];
        chartDiaria.data.datasets[0].backgroundColor = [obtenerColorSalud(resDia.porcentaje), '#f1f5f9'];
        chartDiaria.update();
        document.getElementById('texto-periodo-diaria').innerHTML = `DÍA EN TRABAJO: <span>${diaSeleccionado || '--'}</span>`;
        document.getElementById('texto-meta-diaria').innerHTML =
            `Llevas: <span>${formatMoney(copDia)}</span>
             Faltan: <span>${formatMoney(resDia.falta)}</span>
             Cumplimiento: <span>${resDia.porcentajeTexto}</span>`;

        const resMes = calcularResumenMeta(copMes, META_MENSUAL);
        chartMensual.data.datasets[0].data = [copMes, Math.max(0, META_MENSUAL - copMes)];
        chartMensual.data.datasets[0].backgroundColor = [obtenerColorSalud(resMes.porcentaje), '#f1f5f9'];
        chartMensual.update();
        document.getElementById('texto-periodo-mensual').innerHTML = `MES EN TRABAJO: <span>${formatMonthLabel(mesSeleccionado)}</span>`;
        document.getElementById('texto-meta-mensual').innerHTML =
            `Llevas: <span>${formatMoney(copMes)}</span>
             Faltan: <span>${formatMoney(resMes.falta)}</span>
             Cumplimiento: <span>${resMes.porcentajeTexto}</span>`;
    }

    function guardarTicketCompartido() {
        if (!currentTicketDraft || currentTicketDraft.source === 'history') {
            return currentTicketDraft;
        }

        if (currentTicketDraft.committed) {
            return currentTicketDraft;
        }

        const exists = db.some(t => t.ref === currentTicketDraft.ref);
        if (!exists) {
            db.push({
                ref: currentTicketDraft.ref,
                fechaCompleta: currentTicketDraft.fechaCompleta,
                cliente: currentTicketDraft.cliente,
                cedula: currentTicketDraft.cedula,
                cuenta: currentTicketDraft.cuenta,
                pm: currentTicketDraft.pm,
                cop: parseFlexibleNumber(currentTicketDraft.cop),
                bs: parseFlexibleNumber(currentTicketDraft.bs),
                ganancia: parseFlexibleNumber(currentTicketDraft.cop) * 0.10
            });
            localStorage.setItem('naguara_erp', JSON.stringify(db));
            syncReferenceCounter(currentTicketDraft.ref);
            ensureMonthOption((currentTicketDraft.fechaCompleta || '').substring(0, 7));
        }

        currentTicketDraft.committed = true;
        actualizarDashboard();
        return currentTicketDraft;
    }

    function abrirVistaComprobante(ref) {
        const trans = db.find(t => t.ref === ref);
        if (!trans) return;

        document.getElementById('tick-nombre').value = trans.cliente || '';
        document.getElementById('tick-cedula').value = trans.cedula || '';
        document.getElementById('tick-cuenta').value = trans.cuenta || '';
        document.getElementById('tick-pm').value = trans.pm || '';
        document.getElementById('tick-cop').value = trans.cop;
        document.getElementById('tick-bs').value = trans.bs;
        document.getElementById('tick-nombre').setAttribute('data-ref-active', ref);

        generarTicket();
        document.getElementById('modal-ref-title').innerText = `Comprobante ${ref}`;
        document.getElementById('modal-ticket-img').src = document.getElementById('ticket-result').src;
        document.getElementById('modal-comprobante').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function cerrarVistaComprobante(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('modal-comprobante').classList.remove('show');
        document.body.style.overflow = '';
    }

    function irTicketDesdeModal() {
        cerrarVistaComprobante();
        showTab('ticket');
    }

    async function compartirTicketDesdeModal() {
        try {
            const src = document.getElementById('modal-ticket-img').src || document.getElementById('ticket-result').src;
            if (!src) return;
            const blob = await (await fetch(src)).blob();
            const file = new File([blob], 'ticket.png', { type: 'image/png' });
            if (navigator.share) {
                await navigator.share({ files: [file], title: 'Comprobante NaguaraeGiros' });
            } else {
                alert('Navegador no compatible.');
            }
        } catch (e) {
            console.error(e);
        }
    }

    function descargarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const mes = document.getElementById('filtro-mes').value;
        const dia = document.getElementById('filtro-dia').value;

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.setTextColor(15, 23, 42);
        doc.text('NAGUARAEGIROS', 14, 20);
        doc.setFontSize(10);
        doc.text('EXTRACTO DE RENDIMIENTO FINANCIERO', 14, 26);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(100, 116, 139);
        doc.text('Resumen visual de metas y detalle de operaciones', 14, 31);

        let copMes = 0, copDia = 0;
        db.forEach(t => {
            if (mes === 'all' || (t.fechaCompleta || '').startsWith(mes)) copMes += parseFlexibleNumber(t.cop);
            if ((t.fechaCompleta || '').startsWith(dia)) copDia += parseFlexibleNumber(t.cop);
        });

        const drawStatusCard = (x, y, w, h, label, current, total, periodLabel) => {
            const pct = total > 0 ? Math.min((current / total) * 100, 100) : 0;
            const faltante = Math.max(0, total - current);
            const estado = obtenerEstadoMeta(current, total);
            const barColor = estado.color;
            const rgb = barColor === '#10b981' ? [16, 185, 129] : (barColor === '#eab308' ? [234, 179, 8] : [239, 68, 68]);

            doc.setDrawColor(226, 232, 240);
            doc.setFillColor(248, 250, 252);
            doc.roundedRect(x, y, w, h, 3, 3, 'FD');

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text(label, x + 4, y + 6);

            doc.setFontSize(8);
            doc.setTextColor(15, 23, 42);
            doc.text(periodLabel, x + 4, y + 11);

            doc.setFontSize(11);
            doc.setTextColor(15, 23, 42);
            doc.text(`${formatMoney(current)} COP`, x + 4, y + 18);

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(7);
            doc.setTextColor(100, 116, 139);
            doc.text(`Faltan: ${formatMoney(faltante)} COP`, x + 4, y + 24);
            doc.text(`Cumplimiento: ${pct.toFixed(1)}%`, x + 4, y + 29);

            doc.setFillColor(241, 245, 249);
            doc.roundedRect(x + 4, y + h - 6, w - 8, 3, 1, 1, 'F');
            doc.setFillColor(barColor);
            doc.roundedRect(x + 4, y + h - 6, (w - 8) * (pct / 100), 3, 1, 1, 'F');

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(7);
            doc.setTextColor(rgb[0], rgb[1], rgb[2]);
            doc.text(`${pct.toFixed(1)}%`, x + w - 4, y + 6, { align: 'right' });
        };

        drawStatusCard(14, 35, 88, 44, 'META DIARIA', copDia, META_DIARIA, `DÍA: ${dia || '--'}`);
        drawStatusCard(108, 35, 88, 44, 'META MENSUAL', copMes, META_MENSUAL, `MES: ${formatMonthLabel(mes)}`);

        const tableData = db.filter(t => mes === 'all' || (t.fechaCompleta || '').startsWith(mes))
            .map(t => [formatDateTime(t.fechaCompleta), t.ref, t.cliente, formatMoney(t.cop), formatMoney(t.ganancia)]);

        doc.autoTable({
            startY: 88,
            head: [['Fecha y hora', 'Ref', 'Cliente', 'Monto COP', 'Ganancia']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [15, 23, 42], fontSize: 9 },
            styles: { fontSize: 8 }
        });

        doc.save(`Reporte_Naguara_${dia || mes}.pdf`);
    }

    function descargarExcel() {
        const mes = document.getElementById('filtro-mes').value;
        let csv = 'Fecha y hora,Referencia,Cliente,Monto COP,Ganancia\n';
        db.forEach(t => {
            if (mes === 'all' || (t.fechaCompleta || '').startsWith(mes)) {
                csv += `${formatDateTime(t.fechaCompleta)},${t.ref},${t.cliente},${formatMoney(t.cop)},${formatMoney(t.ganancia)}\n`;
            }
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', 'Naguara_Extracto.csv');
        link.click();
    }

    function drawZigZag(ctx, y, size, dir) {
        ctx.beginPath();
        ctx.fillStyle = '#f8fafc';
        if (dir === 'up') {
            ctx.moveTo(0, 0);
            for (let x = 0; x <= 500; x += 10) { ctx.lineTo(x + 5, size); ctx.lineTo(x + 10, 0); }
        } else {
            ctx.moveTo(0, 920);
            for (let x = 0; x <= 500; x += 10) { ctx.lineTo(x + 5, 920 - size); ctx.lineTo(x + 10, 920); }
        }
        ctx.fill();
    }

    function drawDividerLine(ctx, x, y, w) {
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + w, y);
        ctx.stroke();
    }

    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
    };

    async function compartirImagen() {
        try {
            generarTicket();
            guardarTicketCompartido();

            const blob = await (await fetch(document.getElementById('ticket-result').src)).blob();
            const file = new File([blob], 'ticket.png', { type: 'image/png' });
            if (navigator.share) await navigator.share({ files: [file], title: 'Comprobante NaguaraeGiros' });
            else alert('Navegador no compatible.');
        } catch (e) {
            console.error(e);
        }
    }

    window.onload = cargarTasas;
</script>
